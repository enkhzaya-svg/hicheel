<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuss.io Academy - Менежмент ба Технологи</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-thin::-webkit-scrollbar {
            width: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 10px;
        }
        .lesson-active {
            background-color: #eff6ff;
            border-right: 4px solid #2563eb;
            color: #1d4ed8;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans overflow-hidden">
    <div id="app" class="flex h-screen overflow-hidden">
        <!-- Sidebar Navigation -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-80 bg-white border-r border-gray-200 transform -translate-x-full transition-transform duration-300 ease-in-out md:relative md:translate-x-0">
            <div class="flex flex-col h-full">
                <div class="p-6 border-b border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">T</div>
                        <h1 class="text-xl font-bold text-gray-800">Tuss.io Academy</h1>
                    </div>
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <div class="p-4 border-b border-gray-100">
                    <div class="flex justify-between text-sm font-medium mb-2">
                        <span class="text-gray-500">Нийт явц</span>
                        <span id="progress-text" class="text-blue-600">0%</span>
                    </div>
                    <div class="w-full bg-gray-100 rounded-full h-2">
                        <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>

                <nav id="course-nav" class="flex-1 overflow-y-auto py-4 scrollbar-thin">
                    <!-- Navigation content will be injected here by JS -->
                </nav>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col min-w-0 bg-white">
            <header class="h-16 flex items-center justify-between px-4 md:px-8 border-b border-gray-100 shrink-0">
                <button onclick="toggleSidebar()" class="md:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <div class="flex-1 md:flex-none">
                    <nav class="text-sm font-medium text-gray-500 flex items-center gap-2">
                        <span id="breadcrumb-id">Хичээл 1.1</span>
                        <i data-lucide="chevron-right" class="w-4 h-4"></i>
                        <span id="breadcrumb-title" class="text-gray-900 truncate max-w-[200px] md:max-w-none">Менежментийн системчлэгдсэн хандлага</span>
                    </nav>
                </div>
                <div class="hidden sm:flex items-center gap-4">
                    <button class="text-sm font-medium px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg">Тусламж</button>
                    <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs">AD</div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-4 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <!-- Video Player Placeholder -->
                    <div class="relative aspect-video bg-black rounded-2xl overflow-hidden shadow-2xl mb-8 group">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="flex flex-col items-center">
                                <div class="w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform cursor-pointer">
                                    <i data-lucide="play-circle" class="w-10 h-10 text-white fill-current"></i>
                                </div>
                                <p class="text-white mt-4 font-medium">Видео бичлэг энд тоглогдоно</p>
                            </div>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/80 to-transparent">
                            <div class="h-1 w-full bg-gray-600 rounded-full mb-4">
                                <div id="video-progress" class="h-full w-0 bg-blue-500 rounded-full"></div>
                            </div>
                            <div class="flex items-center justify-between text-white text-xs">
                                <span id="video-duration">00:00 / 00:00</span>
                                <div class="flex gap-4">
                                    <i data-lucide="settings" class="w-4 h-4 cursor-pointer"></i>
                                    <i data-lucide="layout-dashboard" class="w-4 h-4 cursor-pointer"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-6">
                        <div class="flex-1">
                            <h2 id="lesson-title" class="text-2xl font-bold text-gray-900 mb-2">Гарчиг ачаалж байна...</h2>
                            <p id="lesson-desc" class="text-gray-600 leading-relaxed mb-6">
                                Тайлбар ачаалж байна...
                            </p>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                    <h4 class="text-sm font-bold text-gray-700 mb-1">Менежментийн концепц:</h4>
                                    <ul id="lesson-concepts" class="text-sm text-gray-600 space-y-2 mt-3">
                                        <!-- Concepts will be injected here -->
                                    </ul>
                                </div>
                                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                                    <h4 class="text-sm font-bold text-gray-700 mb-1">Систем дэх хэрэглээ:</h4>
                                    <ul id="lesson-apps" class="text-sm text-gray-600 space-y-2 mt-3">
                                        <!-- App applications will be injected here -->
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="shrink-0">
                            <button id="complete-btn" onclick="toggleComplete()" class="w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm bg-blue-600 text-white hover:bg-blue-700">
                                Хичээл дуусгах
                            </button>
                        </div>
                    </div>

                    <div class="mt-12 pt-8 border-t border-gray-100 flex items-center justify-between">
                        <button id="prev-btn" onclick="navigateLesson(-1)" class="flex items-center gap-2 text-sm font-bold text-gray-400 disabled:opacity-30">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            Өмнөх
                        </button>
                        <button id="next-btn" onclick="navigateLesson(1)" class="flex items-center gap-2 text-sm font-bold text-blue-600 hover:text-blue-700">
                            Дараагийн
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // Шинэчлэгдсэн курсын өгөгдөл: Менежмент + Tuss.io
        const courseData = [
            {
                title: "Бүлэг 1: Менежментийн суурь ба Систем",
                icon: "book-open",
                lessons: [
                    { 
                        id: "1.1", 
                        title: "Менежментийн системчлэгдсэн хандлага", 
                        duration: "08:20", 
                        desc: "Байгууллагыг амьд организм мэтээр системчлэн харах нь амжилтын үндэс юм. Tuss.io хэрхэн энэ логик дээр суурилдаг вэ?",
                        concepts: ["Системт сэтгэлгээ", "Орц-Үйл явц-Гарц"],
                        apps: ["Байгууллагын зураглал", "Мэдээллийн урсгал"]
                    },
                    { 
                        id: "1.2", 
                        title: "PDCA цикл ба Тасралтгүй сайжруулалт", 
                        duration: "06:45", 
                        desc: "Төлөвлөх, Гүйцэтгэх, Хянах, Сайжруулах циклийг дижитал орчинд хэрэгжүүлэх арга зүй.",
                        concepts: ["PDCA аргачлал", "Кайзен"],
                        apps: ["Ажлын төлөв", "Гүйцэтгэлийн шинжилгээ"]
                    }
                ]
            },
            {
                title: "Бүлэг 2: Процесс суурьтай удирдлага",
                icon: "layout-dashboard",
                lessons: [
                    { 
                        id: "2.1", 
                        title: "Бизнес процессын загварчлал", 
                        duration: "12:30", 
                        desc: "Дүрэм журам гэхээсээ илүүтэй үр дүнд хүрэх 'Зам'-ыг хэрхэн зурах вэ? Tuss.io Process Modeler ашиглах нь.",
                        concepts: ["BPMN стандарт", "Урсгал зураг"],
                        apps: ["Процесс үүсгэх", "Алхам тодорхойлох"]
                    },
                    { 
                        id: "2.2", 
                        title: "Хариуцлагын матриц (RACI)", 
                        duration: "07:15", 
                        desc: "Хэн юуг хариуцахыг тодорхой болгох нь зөрчлийг арилгана. Системд үүрэг хуваарилах заавар.",
                        concepts: ["RACI матриц", "Хүлээх хариуцлага"],
                        apps: ["Гүйцэтгэгч томилох", "Хянагч тохируулах"]
                    }
                ]
            },
            {
                title: "Бүлэг 3: Төсөл ба Ажлын гүйцэтгэл",
                icon: "briefcase",
                lessons: [
                    { 
                        id: "3.1", 
                        title: "Зорилтот удирдлага (MBO)", 
                        duration: "09:50", 
                        desc: "Ажил бүр байгууллагын том зорилгод хүрэх алхам байх ёстой. Систем дэх Төсөл-Ажил уялдаа.",
                        concepts: ["MBO онол", "SMART зорилт"],
                        apps: ["Төслийн бүтэц", "Дэд ажлууд"]
                    },
                    { 
                        id: "3.2", 
                        title: "Канбан ба Visual Management", 
                        duration: "05:40", 
                        desc: "Ажлын явцыг нүдээр харах нь ачааллыг тэнцвэржүүлэх боломж олгоно.",
                        concepts: ["Ажлын урсгал хянах", "Саатлыг илрүүлэх"],
                        apps: ["Канбан самбар", "Шүүлтүүр ашиглах"]
                    }
                ]
            }
        ];

        let activeModuleIdx = 0;
        let activeLessonIdx = 0;
        let completedLessons = [];

        function init() {
            renderNav();
            updateUI();
            lucide.createIcons();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        function renderNav() {
            const nav = document.getElementById('course-nav');
            nav.innerHTML = '';

            courseData.forEach((module, mIdx) => {
                const moduleEl = document.createElement('div');
                moduleEl.className = 'mb-4';
                
                let lessonsHTML = '';
                module.lessons.forEach((lesson, lIdx) => {
                    const isActive = activeModuleIdx === mIdx && activeLessonIdx === lIdx;
                    const isCompleted = completedLessons.includes(lesson.id);
                    const icon = isCompleted ? 'check-circle-2' : 'play-circle';
                    const iconClass = isCompleted ? 'text-green-500' : 'text-gray-400';
                    
                    lessonsHTML += `
                        <button onclick="setActive(${mIdx}, ${lIdx})" class="w-full flex items-center gap-3 px-6 py-3 transition-colors ${isActive ? 'lesson-active' : 'hover:bg-gray-50 text-gray-600'}">
                            <i data-lucide="${icon}" class="w-5 h-5 ${iconClass} flex-shrink-0"></i>
                            <div class="flex flex-col items-start text-left">
                                <span class="text-sm font-medium leading-tight">${lesson.title}</span>
                                <span class="text-xs text-gray-400 mt-1">${lesson.duration}</span>
                            </div>
                        </button>
                    `;
                });

                moduleEl.innerHTML = `
                    <div class="px-6 py-2 flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                        <i data-lucide="${module.icon}" class="w-4 h-4"></i>
                        ${module.title}
                    </div>
                    ${lessonsHTML}
                `;
                nav.appendChild(moduleEl);
            });
            lucide.createIcons();
        }

        function setActive(mIdx, lIdx) {
            activeModuleIdx = mIdx;
            activeLessonIdx = lIdx;
            updateUI();
            renderNav();
            if (window.innerWidth < 768) {
                const sidebar = document.getElementById('sidebar');
                sidebar.classList.add('-translate-x-full');
            }
        }

        function updateUI() {
            const lesson = courseData[activeModuleIdx].lessons[activeLessonIdx];
            
            document.getElementById('breadcrumb-id').innerText = `Хичээл ${lesson.id}`;
            document.getElementById('breadcrumb-title').innerText = lesson.title;
            document.getElementById('lesson-title').innerText = lesson.title;
            document.getElementById('lesson-desc').innerText = lesson.desc;
            document.getElementById('video-duration').innerText = `00:00 / ${lesson.duration}`;

            // Concepts and Apps update
            const conceptList = document.getElementById('lesson-concepts');
            conceptList.innerHTML = lesson.concepts.map(c => `
                <li class="flex items-center gap-2">
                    <div class="w-1.5 h-1.5 bg-blue-500 rounded-full"></div>
                    ${c}
                </li>
            `).join('');

            const appList = document.getElementById('lesson-apps');
            appList.innerHTML = lesson.apps.map(a => `
                <li class="flex items-center gap-2 text-blue-700 font-medium">
                    <i data-lucide="check" class="w-3.5 h-3.5"></i>
                    ${a}
                </li>
            `).join('');

            // Complete Button
            const btn = document.getElementById('complete-btn');
            if (completedLessons.includes(lesson.id)) {
                btn.innerHTML = '<i data-lucide="check-circle-2" class="w-5 h-5"></i> Дууссан';
                btn.className = 'w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm bg-green-100 text-green-700 border border-green-200';
            } else {
                btn.innerHTML = 'Хичээл дуусгах';
                btn.className = 'w-full md:w-auto flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-sm bg-blue-600 text-white hover:bg-blue-700';
            }

            // Navigation buttons
            document.getElementById('prev-btn').disabled = (activeModuleIdx === 0 && activeLessonIdx === 0);
            
            updateProgress();
            lucide.createIcons();
        }

        function toggleComplete() {
            const lesson = courseData[activeModuleIdx].lessons[activeLessonIdx];
            const index = completedLessons.indexOf(lesson.id);
            if (index > -1) {
                completedLessons.splice(index, 1);
            } else {
                completedLessons.push(lesson.id);
            }
            updateUI();
            renderNav();
        }

        function updateProgress() {
            const total = courseData.reduce((acc, m) => acc + m.lessons.length, 0);
            const progress = Math.round((completedLessons.length / total) * 100);
            document.getElementById('progress-text').innerText = `${progress}%`;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function navigateLesson(dir) {
            let nextL = activeLessonIdx + dir;
            let nextM = activeModuleIdx;

            if (nextL < 0) {
                if (nextM > 0) {
                    nextM--;
                    nextL = courseData[nextM].lessons.length - 1;
                } else return;
            } else if (nextL >= courseData[nextM].lessons.length) {
                if (nextM < courseData.length - 1) {
                    nextM++;
                    nextL = 0;
                } else return;
            }

            setActive(nextM, nextL);
        }

        window.onload = init;
    </script>
</body>
</html>
